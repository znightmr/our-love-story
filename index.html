<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Anniversary</title>

    <!-- Tab icon (favicon). Swap the ❤️ below for any emoji you like (e.g. 🦖). -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Language toggle -->
<div class="lang-toggle" id="langToggle" role="group" aria-label="Language">
    <button type="button" data-lang="en">EN</button>
    <button type="button" data-lang="th">ไทย</button>
</div>

<!-- Loading -->
<div id="loading">
    <div class="loading-heart">&#10084;</div>
    <p id="loadingText">Loading our story&hellip;</p>
</div>

<!-- Hero -->
<header class="hero" id="top">
    <div class="hero-content">
        <p class="eyebrow" id="heroEyebrow">Our Anniversary</p>
        <h1 id="heroNames"></h1>
        <p class="hero-sub" id="heroSince"></p>
        <button id="startBtn" class="btn">Begin our story</button>
    </div>
    <div class="scroll-cue" aria-hidden="true">&#8964;</div>
</header>

<!-- Counter -->
<section id="counter" class="reveal">
    <p class="eyebrow" id="counterEyebrow">Together for</p>
    <h2 id="counterHeadline"></h2>
    <div id="loveCounter" class="counter-grid"></div>
    <p class="counter-note" id="counterNote"></p>
</section>

<!-- Letter -->
<section id="letter" class="reveal">
    <p class="eyebrow" id="letterEyebrow">A little letter</p>
    <h2 id="letterTitle"></h2>
    <div class="letter-card">
        <p id="typing"></p>
        <p class="signature" id="letterSign"></p>
    </div>
</section>

<!-- Timeline -->
<section id="timeline" class="reveal">
    <p class="eyebrow" id="timelineEyebrow">Along the way</p>
    <h2 id="timelineTitle">Our memories</h2>
    <div class="timeline" id="timelineList"></div>
</section>

<!-- Gallery -->
<section id="gallery" class="reveal">
    <p class="eyebrow" id="galleryEyebrow">Moments</p>
    <h2 id="galleryTitle">Us, in pictures</h2>
    <div class="gallery" id="galleryGrid"></div>
</section>

<!-- Reasons -->
<section id="reason" class="reveal">
    <p class="eyebrow" id="reasonEyebrow">Just because</p>
    <h2 id="reasonTitle">Reasons I love you</h2>
    <div id="reasonText"></div>
    <button id="reasonBtn" class="btn ghost">Another reason</button>
</section>

<!-- Song -->
<section id="song" class="reveal">
    <p class="eyebrow" id="songEyebrow">Our song</p>
    <h2 id="songTitle"></h2>
    <a id="songLink" class="btn" target="_blank" rel="noopener">Listen</a>
</section>

<!-- Ending -->
<section id="ending" class="reveal">
    <h2 id="endingTitle"></h2>
    <p id="endingBody"></p>
    <div class="heart">&#10084;</div>
</section>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" role="dialog" aria-hidden="true">
    <span class="lightbox-close" aria-label="Close">&times;</span>
    <img id="lightboxImg" alt="">
</div>

<script src="script.js"></script>
</body>
</html>
